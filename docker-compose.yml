services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.13
    container_name: vamsasetu-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/vamsasetu123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p vamsasetu123 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vamsasetu-network

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: vamsasetu-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=vamsasetu
      - POSTGRES_USER=vamsasetu
      - POSTGRES_PASSWORD=vamsasetu123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vamsasetu"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vamsasetu-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vamsasetu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vamsasetu-network

  # Backend Go + Fiber Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vamsasetu-backend
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_URL=host=postgres user=vamsasetu password=vamsasetu123 dbname=vamsasetu port=5432 sslmode=disable TimeZone=UTC
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=vamsasetu123
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./backend:/app
    networks:
      - vamsasetu-network

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vamsasetu-frontend
    ports:
      - "5173:3000"
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - VITE_WS_URL=ws://localhost:8080/ws
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vamsasetu-network

volumes:
  neo4j_data:
    name: vamsasetu_neo4j_data
  neo4j_logs:
    name: vamsasetu_neo4j_logs
  postgres_data:
    name: vamsasetu_postgres_data
  redis_data:
    name: vamsasetu_redis_data

networks:
  vamsasetu-network:
    name: vamsasetu-network
    driver: bridge
